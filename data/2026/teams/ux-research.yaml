team: "UX-исследования"
owner: "Мария Соколова"

display:
  color: "#10b981"

tracks:
  - name: "Исследовательская база"
    goal: "Команды принимают продуктовые решения опираясь на данные, а не интуицию"
    objectives:
      - title: "Запустить репозиторий инсайтов"
        description: "Единое хранилище результатов исследований, доступное всем командам"
        quarter: "Q1-Q2"
        prerequisites: "Согласован формат хранения данных"
        dependencies: "DevOps, Продуктовые команды"
        key_results:
          - title: "Репозиторий запущен и доступен всем дизайнерам"
            target: "1 репозиторий"
          - title: "Загружены результаты исследований за последние 12 месяцев"
            description: "Ретроспективная загрузка существующих материалов"
            target: "≥20 исследований"

      - title: "Внедрить шаблоны для командных исследований"
        description: "Стандартизированные шаблоны для интервью, юзабилити-тестов и опросов"
        quarter: "Q2"
        prerequisites: "Репозиторий инсайтов запущен"
        dependencies: "DS-команда"
        key_results:
          - title: "Шаблоны приняты командами продуктового дизайна"
            target: "3 шаблона"

  - name: "Методология и обучение"
    goal: "Каждый продуктовый дизайнер умеет самостоятельно проводить базовые исследования"
    objectives:
      - title: "Провести серию воркшопов по исследованиям"
        description: "Обучить дизайнеров методам интервью и юзабилити-тестирования"
        quarter: "Q3"
        prerequisites: "Шаблоны готовы"
        dependencies: "HR, Дизайн-гильдия"
        key_results:
          - title: "Обучено ≥10 дизайнеров"
            target: "10 человек"
          - title: "NPS воркшопа"
            target: "≥70"

      - title: "Запустить ежеквартальный Research Review"
        description: "Регулярная встреча для обмена инсайтами между командами"
        quarter: "Q4"
        prerequisites: "Воркшопы проведены"
        dependencies: "Все дизайн-команды"
        key_results:
          - title: "Проведено ≥2 сессий в Q4"
            target: "2 сессии"
          - title: "Участие ≥3 команд в каждой сессии"
            target: "3 команды"

kpis:
  - name: "Исследования на решение"
    description: "Доля продуктовых решений, подкреплённых хотя бы одним исследованием"
    target: "60%"
  - name: "Время до инсайта"
    description: "Среднее время от запроса на исследование до готового отчёта"
    target: "≤10 дней"
