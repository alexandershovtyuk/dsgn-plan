team: "Дизайн-система"
owner: "Александр Шовтюк"

display:
  color: "#3b82f6"

tracks:
  - name: "Инфраструктура и архитектура"
    goal: "Дизайн-система переведена на масштабируемую модульную архитектуру и работает предсказуемо"
    objectives:
      - title: "Завершить оптимизацию библиотек"
        quarter: "Q2-Q3"
        key_results:
          - title: "100% компонентов перенесены из монолитных библиотек в модульные с сохранением связей в макетах дизайнеров"
          - title: "Все токены в компонентах корректно привязаны к библиотечным источникам — цвет не разрывается при смене темы"

      - title: "Перевести темы на расширенные коллекции"
        quarter: "Q4"
        key_results:
          - title: "~20 тем переведены на схему базовая + расширенная коллекция; тема переключается без переопределений в общем наборе компонентов"

  - name: "Цветовая система"
    goal: "Новая перцептивная палитра принята и внедрена в токен-систему дизайн-системы"
    objectives:
      - title: "Утвердить палитру"
        quarter: "Q3"
        key_results:
          - title: "Палитра согласована с руководителями дизайн-гильдии; не дублирует оттенки между продуктами, является общей платформой для 90% продуктов компании"
          - title: "Подготовлен план перехода на новую палитру: для каждого токена определён эквивалент в новой системе, критические изменения обозначены"

      - title: "Внедрить в токен-систему"
        quarter: "Q4"
        key_results:
          - title: "100% смысловых токенов (цвет, акцент, поверхности, статусы) переведены на новую палитру в базовой коллекции"
          - title: "100% базовых компонентов проверены на соответствие требованиям контрастности; выявленные нарушения зафиксированы как задачи на улучшение"

  - name: "Портал дизайн-системы"
    goal: "Портал работает как надёжный источник правды для дизайнеров, разработчиков и ИИ-агентов"
    objectives:
      - title: "Запустить прототип портала"
        quarter: "Q2"
        key_results:
          - title: "Прототип запущен и продемонстрирован в узком кругу: команда и ≥2 команды-потребителя"

      - title: "Выпустить версию 1.0"
        quarter: "Q3"
        key_results:
          - title: "Раздел редакционной политики сформирован: правила контента, голос, структура страниц, стандарты оформления"
          - title: "Раздел бренда собран: логотипы, шрифты, презентационные шаблоны и корпоративные материалы доступны для скачивания"
          - title: "Все компоненты из библиотеки добавлены на портал — каждый с минимальным описанием применимости, примерами использования и описанием параметров"

      - title: "Подготовить слой для работы с ИИ"
        quarter: "Q4"
        key_results:
          - title: "Документация компонентов структурирована в машиночитаемом формате: параметры, примеры кода, описание поведения"
          - title: "Портал подключён к корпоративному ИИ-стеку как источник знаний (Avatar / реестр инструментов)"
          - title: "Роадмап дизайн-системы живёт на портале и обновляется каждый квартал"

kpis:
  - name: "Целостность токенов"
    description: "Доля компонентов в опубликованных библиотеках без разорванных ссылок на токены"
    target: "100%"
  - name: "Покрытие журналом изменений"
    description: "Доля релизов дизайн-системы, сопровождённых актуальным журналом изменений"
    target: "100%"
